service: FeatureflowLambdaAtEdge

# Serverless Dashboard: set org and app (from app.serverless.com), then deploy with SERVERLESS_ACCESS_KEY set
org: myorg
app: featureflow-lambda-edge

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1

functions:
  redirect:
    handler: src/handler.handler
    events:
      - cloudFront:
          eventType: origin-request
          origin: http://featureflow-redirect-example.s3-website-us-east-1.amazonaws.com


# TypeScript is compiled automatically by Serverless v4 built-in esbuild (serverless dev, invoke local, deploy)
build:
  esbuild:
    bundle: true
    target: node20
    sourcemap: true

package:
  excludeDevDependencies: false